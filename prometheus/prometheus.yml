global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - network-prometheus:9090

  - job_name: snmp-switches
    metrics_path: /snmp
    params:
      module:
        - if_mib
    static_configs:
      - targets:
          - 172.31.1.5
          - 172.31.1.6
          - 172.31.1.7
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: network-snmp-exporter:9116