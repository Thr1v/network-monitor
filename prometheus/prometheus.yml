global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - network-prometheus:9090

  - job_name: snmp-switches
    scrape_timeout: 30s
    metrics_path: /snmp
    params:
      module:
        - if_mib
      auth:
        - public_v2
    static_configs:
      - targets:
          - 172.31.1.5
        labels:
          device_name: M002-Admin-1
          location: M002
      - targets:    
          - 172.31.1.6
        labels:
          device_name: M002-Admin-2
          location: M002
      - targets:
          - 172.31.1.7    
        labels:
          device_name: M002-Admin-3
          location: M002
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: network-snmp-exporter:9116